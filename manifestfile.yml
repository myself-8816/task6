apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep
spec:
  replicas: 2
  selector:
    matchLabel:
      app: tes
  template:
    metadata:
      labels:
        app: tes
spec:
  containers:
    - name: cicd
      image: pavansai33/pavan1img:v123
      ports:
    - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: ser
spec:
  type: LoadBalancer
  selector:
    app: tes
  ports:
    - port: 8080
      targetPort: 8080
